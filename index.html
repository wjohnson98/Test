<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudbeds Sales Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cb-blue:       #1B4FFF;
  --cb-blue-dark:  #1340D6;
  --cb-blue-light: #EEF2FF;
  --cb-navy:       #0D1F4E;
  --cb-border:     #D9E1F2;
  --cb-bg:         #F5F7FB;
  --cb-text:       #1A1F36;
  --cb-muted:      #6B7694;
  --cb-white:      #FFFFFF;
  --cb-green:      #0FA958;
  --cb-green-light:#EDFBF3;
  --cb-orange:     #E65100;
  --cb-orange-light:#FFF3E0;
  --cb-purple:     #7B61FF;
  --radius:        8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Poppins', Arial, sans-serif;
  background: var(--cb-bg);
  color: var(--cb-text);
  font-size: 13px;
  line-height: 1.5;
}

/* ── Layout ── */
.platform {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 54px;
  min-height: 54px;
  background: var(--cb-white);
  border-bottom: 2px solid var(--cb-blue-light);
  box-shadow: 0 1px 4px rgba(27,79,255,0.06);
  z-index: 50;
}

.topbar-left { display: flex; align-items: center; gap: 10px; }

.logo-mark { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.logo-mark img { width: 100%; height: 100%; object-fit: cover; }

.logo-text h1 { font-size: 14px; font-weight: 700; color: var(--cb-navy); line-height: 1.2; }
.logo-text p { font-size: 10px; color: var(--cb-muted); font-weight: 400; }

/* ── Tab Navigation ── */
.tab-nav { display: flex; align-items: stretch; height: 100%; gap: 2px; }

.tab-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px; height: 100%; border: none;
  background: transparent; font-family: inherit;
  font-size: 12px; font-weight: 600; color: var(--cb-muted);
  cursor: pointer; position: relative;
  transition: color 0.15s, background 0.15s; white-space: nowrap;
}
.tab-btn:hover { color: var(--cb-navy); background: var(--cb-blue-light); }
.tab-btn.active { color: var(--cb-blue); }
.tab-btn::after {
  content: ''; position: absolute; bottom: -2px; left: 12px; right: 12px;
  height: 3px; border-radius: 3px 3px 0 0; background: transparent; transition: background 0.2s;
}
.tab-btn.active::after { background: var(--cb-blue); }

.tab-icon {
  width: 20px; height: 20px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px; font-weight: 700; color: #fff;
}
.tab-icon.sf { background: #00A1E0; }
.tab-icon.sl { background: #FF6D3B; }
.tab-icon.dh { background: var(--cb-purple); }

.shortcut-hint {
  font-size: 9px; font-weight: 500; color: var(--cb-muted);
  background: var(--cb-bg); border: 1px solid var(--cb-border);
  border-radius: 4px; padding: 1px 5px; opacity: 0.7;
}

/* ── Right Controls ── */
.topbar-right { display: flex; align-items: center; gap: 8px; }

.ctrl-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  height: 34px; padding: 0 12px; border: 1.5px solid var(--cb-border);
  border-radius: var(--radius); background: var(--cb-white);
  color: var(--cb-muted); font-family: inherit; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.ctrl-btn:hover { border-color: var(--cb-blue); color: var(--cb-blue); background: var(--cb-blue-light); }
.ctrl-btn svg {
  width: 15px; height: 15px; stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ── Content Area ── */
.tab-content { flex: 1; position: relative; overflow: hidden; background: var(--cb-bg); }

.tab-pane { position: absolute; inset: 0; display: none; }
.tab-pane.active { display: block; }

.tab-pane iframe {
  width: 100%; height: 100%; border: none; background: var(--cb-white);
}

/* ── Loading overlay ── */
.iframe-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--cb-bg); gap: 14px; z-index: 5; transition: opacity 0.3s;
}
.iframe-loading.hidden { opacity: 0; pointer-events: none; }

.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--cb-border);
  border-top-color: var(--cb-blue); border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; font-weight: 500; color: var(--cb-muted); }

/* ── Status Bar ── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 28px; min-height: 28px;
  background: var(--cb-white); border-top: 1px solid var(--cb-border);
  font-size: 10px; color: var(--cb-muted);
}
.status-left, .status-right { display: flex; align-items: center; gap: 12px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cb-green); display: inline-block; }
.status-item { display: flex; align-items: center; gap: 4px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .tab-btn { padding: 0 12px; }
  .shortcut-hint { display: none; }
  .tab-btn .tab-label { display: none; }
  .ctrl-btn span { display: none; }
  .logo-text p { display: none; }
}
@media (max-width: 480px) {
  .topbar { padding: 0 12px; }
  .tab-btn { padding: 0 10px; }
}
</style>
</head>
<body>

<div class="platform">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <img src="https://revenue-hub.com/wp-content/uploads/2021/12/cloudbeds-mark-2025.png" alt="Cloudbeds">
      </div>
      <div class="logo-text">
        <h1>Sales Platform</h1>
        <p>Unified Workspace</p>
      </div>
    </div>

    <div class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="salesforce" onclick="switchTab('salesforce')">
        <span class="tab-icon sf">SF</span>
        <span class="tab-label">Salesforce</span>
        <span class="shortcut-hint">⌘1</span>
      </button>
      <button class="tab-btn" data-tab="salesloft" onclick="switchTab('salesloft')">
        <span class="tab-icon sl">SL</span>
        <span class="tab-label">Salesloft</span>
        <span class="shortcut-hint">⌘2</span>
      </button>
      <button class="tab-btn" data-tab="dealhub" onclick="switchTab('dealhub')">
        <span class="tab-icon dh">DH</span>
        <span class="tab-label">DealHub</span>
        <span class="shortcut-hint">⌘3</span>
      </button>
    </div>

    <div class="topbar-right">
      <button class="ctrl-btn" onclick="refreshCurrent()" title="Refresh current tab (⌘R)">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="ctrl-btn" onclick="popoutCurrent()" title="Open in new window">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <span>Pop Out</span>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="tab-content">
    <div class="tab-pane active" id="pane-salesforce">
      <div class="iframe-loading" id="loading-salesforce">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Salesforce...</div>
      </div>
      <iframe
        id="iframe-salesforce"
        data-src="https://cloudbeds.lightning.force.com/lightning/page/home"
        allow="clipboard-read; clipboard-write; camera; microphone; geolocation; fullscreen"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <div class="tab-pane" id="pane-salesloft">
      <div class="iframe-loading" id="loading-salesloft">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Salesloft...</div>
      </div>
      <iframe
        id="iframe-salesloft"
        data-src="https://app.salesloft.com/app"
        allow="clipboard-read; clipboard-write; camera; microphone; geolocation; fullscreen"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <div class="tab-pane" id="pane-dealhub">
      <div class="iframe-loading" id="loading-dealhub">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading DealHub...</div>
      </div>
      <iframe
        id="iframe-dealhub"
        data-src="https://service-us1.dealhub.io/ws#/proposals"
        allow="clipboard-read; clipboard-write; camera; microphone; geolocation; fullscreen"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-item"><span class="status-dot"></span><span>Connected</span></div>
      <span id="statusCurrentTab">Salesforce</span>
    </div>
    <div class="status-right">
      <span>⌘1-3 Switch</span>
      <span>⌘R Refresh</span>
      <span id="statusTime"></span>
    </div>
  </div>

</div>

<script>
const TABS = {
  salesforce: { label: 'Salesforce', url: 'https://cloudbeds.lightning.force.com/lightning/page/home' },
  salesloft:  { label: 'Salesloft',  url: 'https://app.salesloft.com/app' },
  dealhub:    { label: 'DealHub',    url: 'https://service-us1.dealhub.io/ws#/proposals' }
};

let activeTab = 'salesforce';
const loadedTabs = new Set();

function switchTab(tabId) {
  if (activeTab === tabId) return;
  activeTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tabId));
  loadTab(tabId);
  document.getElementById('statusCurrentTab').textContent = TABS[tabId].label;
}

function loadTab(tabId) {
  if (loadedTabs.has(tabId)) return;
  loadedTabs.add(tabId);
  const iframe = document.getElementById('iframe-' + tabId);
  const loading = document.getElementById('loading-' + tabId);
  iframe.src = iframe.dataset.src;
  iframe.addEventListener('load', () => { if (loading) loading.classList.add('hidden'); });
  setTimeout(() => { if (loading) loading.classList.add('hidden'); }, 5000);
}

function refreshCurrent() {
  const iframe = document.getElementById('iframe-' + activeTab);
  const loading = document.getElementById('loading-' + activeTab);
  if (loading) loading.classList.remove('hidden');
  try { iframe.contentWindow.location.reload(); } catch (e) { iframe.src = iframe.dataset.src; }
  setTimeout(() => { if (loading) loading.classList.add('hidden'); }, 5000);
}

function popoutCurrent() {
  window.open(TABS[activeTab].url, '_blank', 'noopener');
}

document.addEventListener('keydown', (e) => {
  const isMod = e.metaKey || e.ctrlKey;
  if (!isMod) return;
  const map = { '1': 'salesforce', '2': 'salesloft', '3': 'dealhub' };
  if (map[e.key]) { e.preventDefault(); switchTab(map[e.key]); }
  if ((e.key === 'r' || e.key === 'R') && document.querySelector('.platform')) { e.preventDefault(); refreshCurrent(); }
});

function updateClock() {
  document.getElementById('statusTime').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

// Init: load first tab
loadTab('salesforce');
</script>
</body>
</html>
